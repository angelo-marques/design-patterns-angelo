<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Patterns — Angelo Silva | Referência para Desenvolvedores</title>
  <meta name="description" content="Guia completo de Design Patterns com exemplos em Java, C#, Python e Ruby. Por Angelo Marques de Oliveira Silva — Tech Lead com 17+ anos de experiência." />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Framer Motion via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@12.23.22/dist/framer-motion.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
  
  <style>
    :root {
      --primary: #58a6ff;
      --primary-foreground: #0d1117;
      --secondary: #3fb950;
      --accent: #d29922;
      --destructive: #f85149;
      --background: #0d1117;
      --foreground: #e6edf3;
      --card: #161b22;
      --card-foreground: #e6edf3;
      --border: #30363d;
      --muted: #8b949e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      line-height: 1.6;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    code, pre {
      font-family: 'Fira Code', monospace;
    }

    button {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    @media (min-width: 640px) {
      .container {
        padding: 0 1.5rem;
      }
    }

    @media (min-width: 1024px) {
      .container {
        padding: 0 2rem;
      }
    }

    /* Blueprint grid background */
    .blueprint-grid {
      background-image: 
        linear-gradient(#58a6ff 1px, transparent 1px),
        linear-gradient(90deg, #58a6ff 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.03;
    }

    /* Smooth animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .slide-in-left {
      animation: slideInLeft 0.6s ease-out;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* Syntax highlighting */
    .code-keyword { color: #ff7b72; }
    .code-string { color: #a5d6ff; }
    .code-comment { color: #8b949e; font-style: italic; }
    .code-class { color: #ffa657; }
    .code-number { color: #79c0ff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone para JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Data -->
  <script src="/data.js"></script>
  
  <!-- App -->
  <script type="text/babel" src="/app.js"></script>
</body>
</html>
